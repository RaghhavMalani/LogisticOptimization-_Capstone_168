# Infrastructure for the production-style path of the forecasting system:
#   * PostgreSQL  -> the Data Storage Layer
#   * Zookeeper + Kafka -> the real-time streaming bus
#
# Quick start:
#   docker compose up -d
#   $env:DATABASE_URL = "postgresql+psycopg2://logistics:logistics@localhost:5432/logistics"   # PowerShell
#   $env:KAFKA_BOOTSTRAP_SERVERS = "localhost:9092"
#   python run_demo.py --store --stream
#
# Without Docker, the code falls back automatically to SQLite + an in-memory bus,
# so everything still runs.

version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: logistics_postgres
    environment:
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD: logistics
      POSTGRES_DB: logistics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: logistics_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: logistics_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  pgdata:
