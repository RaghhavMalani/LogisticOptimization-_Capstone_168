<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>India PortWatch — Command Center</title>
  <link rel="stylesheet" href="/styles/app.css" />
  <!-- MapLibre GL (map interop only — everything else is dependency-free). -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
        onerror="window.__noMapCss=true" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"
          onerror="window.__noMap=true"></script>
</head>
<body>
  <div id="shell">
    <header id="topbar">
      <div class="brand">
        <span class="brand-mark">◈</span>
        <span class="brand-name">INDIA <b>PORTWATCH</b></span>
        <span class="brand-sub">PREDICTIVE PORT INTELLIGENCE</span>
      </div>
      <div class="topbar-right">
        <span id="data-mode-chip" class="chip">…</span>
        <span id="utc-clock" class="clock"></span>
      </div>
    </header>

    <nav id="navrail">
      <a href="/" data-link class="nav-item" data-route="command">
        <span class="nav-ico">⬢</span><span>Command</span></a>
      <a href="/ports/JNPT" data-link class="nav-item" data-route="cockpit">
        <span class="nav-ico">⚓</span><span>Port Cockpit</span></a>
      <a href="/ships" data-link class="nav-item" data-route="ships">
        <span class="nav-ico">▲</span><span>Ships</span></a>
      <a href="/scenarios" data-link class="nav-item" data-route="scenarios">
        <span class="nav-ico">⚡</span><span>Scenarios</span></a>
      <a href="/analytics" data-link class="nav-item" data-route="analytics">
        <span class="nav-ico">▦</span><span>Analytics</span></a>
      <a href="/model" data-link class="nav-item" data-route="model">
        <span class="nav-ico">⚙</span><span>Model</span></a>
    </nav>

    <main id="view"><div class="loading">INITIALISING COMMAND CENTER…</div></main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
