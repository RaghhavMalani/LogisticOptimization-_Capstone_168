<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>India PortWatch — Holographic Port</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#04070f;
    font-family:ui-monospace,"SF Mono",Menlo,monospace;color:#bfe9ff;}
  #c{display:block;width:100%;height:100%;}
  .vignette{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 30%,transparent 40%,rgba(0,0,0,.7) 100%);}
  #hud{position:fixed;top:18px;left:20px;pointer-events:none;}
  #hud .brand{font-size:12px;letter-spacing:3px;color:#21e6c1;}
  #hud .port{font-size:24px;font-weight:600;margin-top:4px;color:#eaf7ff;
    text-shadow:0 0 18px rgba(33,230,193,.6);}
  #hud .row{margin-top:10px;font-size:12px;color:#7f9bc0;}
  #hud b{color:#eaf7ff;font-weight:600;}
  .chip{display:inline-block;padding:2px 10px;border:1px solid;border-radius:2px;
    font-size:11px;letter-spacing:1px;}
  #panel{position:fixed;top:18px;right:20px;width:178px;text-align:right;pointer-events:none;}
  #panel .lab{font-size:10px;letter-spacing:2px;color:#5b7c9e;margin-top:12px;}
  #panel .val{font-size:20px;font-weight:600;color:#eaf7ff;text-shadow:0 0 14px rgba(47,167,255,.6);}
  #foot{position:fixed;bottom:14px;left:20px;right:20px;display:flex;justify-content:space-between;
    font-size:10px;letter-spacing:2px;color:#46607f;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="vignette"></div>
<div id="hud">
  <div class="brand">INDIA&nbsp;PORTWATCH&nbsp;//&nbsp;HOLO&nbsp;OPS</div>
  <div class="port" id="portName">JNPT — NHAVA SHEVA</div>
  <div class="row">REGIME <b id="regime">CONGESTED</b> &nbsp; RISK
    <span class="chip" id="risk">HIGH</span></div>
  <div class="row">VESSELS AT ANCHOR <b id="anc">6</b></div>
</div>
<div id="panel">
  <div class="lab">CONGESTION P50</div><div class="val" id="cong">72</div>
  <div class="lab">EXPECTED REMAIN</div><div class="val" id="rem">3.4d</div>
</div>
<div id="foot"><span>DRAG&nbsp;ORBIT&nbsp;·&nbsp;SCROLL&nbsp;ZOOM</span>
  <span id="clock">SYNC</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const Q=new URLSearchParams(location.search);const P=window.SHIP_PARAMS||{};
const g=(k,d)=>(P[k]!=null?P[k]:(Q.get(k)!=null?Q.get(k):d));
const names={JNPT:"JNPT — NHAVA SHEVA",MUNDRA:"MUNDRA (APSEZ)",DEENDAYAL:"DEENDAYAL (KANDLA)",
  MUMBAI:"MUMBAI PORT",CHENNAI:"CHENNAI",VIZAG:"VISAKHAPATNAM",KOLKATA:"KOLKATA / HALDIA",
  COCHIN:"COCHIN",PARADIP:"PARADIP",TUTICORIN:"TUTICORIN",KAMARAJAR:"KAMARAJAR (ENNORE)",
  MORMUGAO:"MORMUGAO",NEW_MANGALORE:"NEW MANGALORE"};
const pid=String(g("port","JNPT")).toUpperCase();
const cong=Math.max(0,Math.min(100,+g("congestion",72)));
const risk=String(g("risk","High")).toUpperCase();
const regime=String(g("regime","CONGESTED")).toUpperCase();
const anchored=Math.max(0,Math.round(+g("anchored",Math.round(2+cong*0.08))));
const rc={NORMAL:0x21e6c1,CONGESTED:0xffb020,SEVERE:0xff3b6b};
const accent=rc[regime]||0x21e6c1;
const riskCss={LOW:"#21e6c1",MEDIUM:"#ffb020",HIGH:"#ff3b6b"}[risk]||"#ffb020";
document.getElementById("portName").textContent=names[pid]||pid;
document.getElementById("regime").textContent=regime;
document.getElementById("anc").textContent=anchored;
document.getElementById("cong").textContent=Math.round(cong);
document.getElementById("rem").textContent=(2+cong/30).toFixed(1)+"d";
const rk=document.getElementById("risk");rk.textContent=risk;rk.style.color=riskCss;rk.style.borderColor=riskCss;

const cv=document.getElementById("c");
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x04070f,0.012);
const camera=new THREE.PerspectiveCamera(52,1,0.1,2000);
let ang=0.7,dist=78,hgt=40,drag=false,lx=0,ly=0;
scene.add(new THREE.HemisphereLight(0x335577,0x02040a,0.7));
const key=new THREE.PointLight(accent,1.4,400);key.position.set(0,60,30);scene.add(key);

// radial glow sprite (fake bloom)
function glowTex(hex){const s=128,c=document.createElement("canvas");c.width=c.height=s;
  const x=c.getContext("2d");const col="#"+hex.toString(16).padStart(6,"0");
  const grd=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  grd.addColorStop(0,col);grd.addColorStop(0.25,col);grd.addColorStop(1,"rgba(0,0,0,0)");
  x.globalAlpha=1;x.fillStyle=grd;x.beginPath();x.arc(s/2,s/2,s/2,0,7);x.fill();
  return new THREE.CanvasTexture(c);}
function halo(hex,size){const m=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex(hex),
  blending:THREE.AdditiveBlending,depthWrite:false,transparent:true}));m.scale.set(size,size,1);return m;}

// ---- neon ocean grid (TRON) ----------------------------------------------
const GS=240,GD=60;const oceanGeo=new THREE.PlaneGeometry(GS,GS,GD,GD);oceanGeo.rotateX(-Math.PI/2);
const ocean=new THREE.LineSegments(new THREE.WireframeGeometry(oceanGeo),
  new THREE.LineBasicMaterial({color:0x0e3b5a,transparent:true,opacity:0.55}));
scene.add(ocean);const baseO=oceanGeo.attributes.position.array.slice();
// solid faint sea
const sea=new THREE.Mesh(oceanGeo,new THREE.MeshBasicMaterial({color:0x06121f,transparent:true,opacity:0.6}));
sea.position.y=-0.2;scene.add(sea);

// ---- starfield ------------------------------------------------------------
const starG=new THREE.BufferGeometry();const sv=[];for(let i=0;i<450;i++){
  sv.push((Math.random()-0.5)*900,Math.random()*300+20,(Math.random()-0.5)*900);}
starG.setAttribute("position",new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(starG,new THREE.PointsMaterial({color:0x2a4a66,size:1.2})));

// ---- holographic ship -----------------------------------------------------
function ship(scale,color){const grp=new THREE.Group();
  const hullShape=new THREE.Shape();hullShape.moveTo(-13,-3);hullShape.lineTo(11,-3);
  hullShape.lineTo(15,0);hullShape.lineTo(11,3);hullShape.lineTo(-13,3);hullShape.lineTo(-13,-3);
  const hull=new THREE.Mesh(new THREE.ExtrudeGeometry(hullShape,{depth:8,bevelEnabled:false}),
    new THREE.MeshStandardMaterial({color:0x0a2233,metalness:0.6,roughness:0.35,
      emissive:color,emissiveIntensity:0.18}));
  hull.rotation.x=Math.PI/2;hull.position.set(0,3,4);grp.add(hull);
  grp.add(new THREE.LineSegments(new THREE.EdgesGeometry(hull.geometry),
    new THREE.LineBasicMaterial({color:color})).translateY(0));
  const edges=new THREE.LineSegments(new THREE.EdgesGeometry(hull.geometry),
    new THREE.LineBasicMaterial({color:color,transparent:true,opacity:0.9}));
  edges.rotation.copy(hull.rotation);edges.position.copy(hull.position);grp.add(edges);
  const pal=[0x21e6c1,0x2fa7ff,0xffb020,0xff3b6b,0x9b6bff];
  for(let x=-9;x<=7;x+=3.1)for(let z=-2;z<=2;z+=2){const h=1+((Math.random()*3)|0);
    for(let k=0;k<h;k++){const c=pal[(Math.random()*pal.length)|0];
      const b=new THREE.Mesh(new THREE.BoxGeometry(2.8,1.5,1.7),
        new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.5,
          metalness:0.3,roughness:0.4}));b.position.set(x,5.2+k*1.6,z);grp.add(b);}}
  const bridge=new THREE.Mesh(new THREE.BoxGeometry(2.6,4.5,5.5),
    new THREE.MeshStandardMaterial({color:0x0b2a3d,emissive:color,emissiveIntensity:0.3}));
  bridge.position.set(-10.5,7,0);grp.add(bridge);
  const hl=halo(color,26);hl.position.set(0,7,0);grp.add(hl);
  grp.scale.setScalar(scale);return grp;}

const main=ship(1.0,accent);scene.add(main);

// congestion ring (additive, scales with congestion)
const ring=new THREE.Mesh(new THREE.RingGeometry(14,16+cong*0.5,80),
  new THREE.MeshBasicMaterial({color:accent,transparent:true,opacity:0.35,
    side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
ring.rotation.x=-Math.PI/2;ring.position.y=0.3;scene.add(ring);

// radar sweep
const sweep=new THREE.Mesh(new THREE.CircleGeometry(40,48,0,0.5),
  new THREE.MeshBasicMaterial({color:accent,transparent:true,opacity:0.10,
    side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
sweep.rotation.x=-Math.PI/2;sweep.position.y=0.25;scene.add(sweep);

// quay + neon cranes
const quay=new THREE.Mesh(new THREE.BoxGeometry(70,2,12),
  new THREE.MeshStandardMaterial({color:0x0a1a28,emissive:0x0a2a40,emissiveIntensity:0.4}));
quay.position.set(0,1,-26);scene.add(quay);
for(let x=-26;x<=26;x+=13){const cg=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:0x10394f,emissive:accent,emissiveIntensity:0.25});
  for(const dx of[-3,3])for(const dz of[-3,3]){const leg=new THREE.Mesh(new THREE.BoxGeometry(0.6,16,0.6),mat);
    leg.position.set(dx,8,dz);cg.add(leg);}
  const beam=new THREE.Mesh(new THREE.BoxGeometry(1,1,24),mat);beam.position.set(0,16,6);cg.add(beam);
  cg.position.set(x,2,-26);scene.add(cg);}

// anchored fleet in a queue arc (count = anchored)
const fleet=[];for(let i=0;i<anchored;i++){const s=ship(0.5+Math.random()*0.2,0x2fa7ff);
  const a=Math.PI*(0.1+0.8*(i/(Math.max(1,anchored))));const r=46+Math.random()*30;
  s.position.set(Math.cos(a)*r,0,Math.sin(a)*r+10);s.rotation.y=a+Math.PI;scene.add(s);fleet.push(s);}

// data particles rising
const pc=160,pg=new THREE.BufferGeometry(),pp=new Float32Array(pc*3);
for(let i=0;i<pc;i++){pp[i*3]=(Math.random()-0.5)*120;pp[i*3+1]=Math.random()*60;pp[i*3+2]=(Math.random()-0.5)*120;}
pg.setAttribute("position",new THREE.BufferAttribute(pp,3));
const parts=new THREE.Points(pg,new THREE.PointsMaterial({color:accent,size:0.7,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending}));
scene.add(parts);

cv.addEventListener("pointerdown",e=>{drag=true;lx=e.clientX;ly=e.clientY;});
addEventListener("pointerup",()=>drag=false);
addEventListener("pointermove",e=>{if(!drag)return;ang-=(e.clientX-lx)*0.005;
  hgt=Math.max(12,Math.min(75,hgt-(e.clientY-ly)*0.15));lx=e.clientX;ly=e.clientY;});
addEventListener("wheel",e=>{dist=Math.max(40,Math.min(150,dist+e.deltaY*0.05));},{passive:true});
function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h,false);
  camera.aspect=w/h;camera.updateProjectionMatrix();}addEventListener("resize",resize);resize();

const op=oceanGeo.attributes.position,sp=sea.geometry.attributes.position;let t=0;
function animate(){requestAnimationFrame(animate);t+=0.016;
  for(let i=0;i<op.count;i++){const x=baseO[i*3],z=baseO[i*3+2];
    const y=Math.sin(x*0.06+t)*0.8+Math.cos(z*0.07+t*0.8)*0.8;op.array[i*3+1]=y;sp.array[i*3+1]=y;}
  op.needsUpdate=true;sp.needsUpdate=true;
  main.position.y=Math.sin(t*1.1)*0.5;main.rotation.z=Math.sin(t)*0.02;
  fleet.forEach((s,i)=>{s.position.y=Math.sin(t+i)*0.4;});
  ring.material.opacity=0.25+0.12*Math.sin(t*1.6);ring.rotation.z+=0.002;
  sweep.rotation.z-=0.02;
  const pa=pg.attributes.position;for(let i=0;i<pc;i++){pa.array[i*3+1]+=0.18;
    if(pa.array[i*3+1]>60)pa.array[i*3+1]=0;}pa.needsUpdate=true;
  ang+=drag?0:0.0012;
  camera.position.set(Math.cos(ang)*dist,hgt,Math.sin(ang)*dist);camera.lookAt(0,5,-4);
  renderer.render(scene,camera);}
animate();
const clk=document.getElementById("clock");
setInterval(()=>{clk.textContent="SYNC "+new Date().toLocaleTimeString();},1000);
</script>
</body>
</html>
